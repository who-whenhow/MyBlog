name: Deploy Website

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 这里不指定版本，自动读取 package.json 中的 packageManager
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 使用 --no-check 跳过类型检查，确保构建顺畅
      - name: Build
        run: pnpm astro build --no-check

      # 将构建好的 dist 目录打包为制品
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

      # 将制品部署到 GitHub Pages
      - name: Deploy
        uses: actions/deploy-pages@v4